# Nextest configuration

# Enable experimental setup scripts feature
experimental = ["setup-scripts"]

# Define the setup script
[scripts.setup.generate-test-docs]
command = "scripts/generate-test-docs.sh"

# Run the setup script for all tests
[[profile.default.scripts]]
filter = "all()"
setup = "generate-test-docs"

# Network test group: caps parallelism so we don't hammer docs.rs and
# gives network-dependent tests room to recover from flakes.
[test-groups]
network = { max-threads = 4 }

[[profile.default.overrides]]
filter = "binary(/^network_/)"
test-group = "network"
retries = 2
slow-timeout = { period = "60s", terminate-after = 3 }
